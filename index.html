<!DOCTYPE html>
<html>

<head>
    <title>SafeVault AI 🔐</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .container {
            margin-top: 40px;
        }

        input {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        #dashboard {
            display: none;
        }

        #status {
            font-weight: bold;
            color: red;
        }

        #aiResult {
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>SafeVault AI 🔐</h1>

    <div id="authBox" class="container">
        <h3>Login / Register</h3>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>

    <div id="dashboard" class="container">
        <h3>Dashboard</h3>

        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Save File</button>

        <h4>Your Files:</h4>
        <ul id="fileList"></ul>

        <br>
        <button onclick="simulateRisk()">⚠️ Simulate Risk</button>
        <button onclick="analyzeRisk()">🧠 Analyze with AI</button>
        <button onclick="emergencyLock()">🚨 Emergency Lock</button>

        <p id="status"></p>
        <p id="aiResult"></p>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // DOM elements
        const authBox = document.getElementById("authBox");
        const dashboard = document.getElementById("dashboard");
        const fileInput = document.getElementById("fileInput");
        const fileList = document.getElementById("fileList");
        const status = document.getElementById("status");
        const aiResult = document.getElementById("aiResult");

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDMNcZl92ji_R2Wry4Rty-Telh-8MIjvAg",
            authDomain: "neurovault-cb7cf.firebaseapp.com",
            projectId: "neurovault-cb7cf",
            databaseURL: "https://neurovault-cb7cf-default-rtdb.firebaseio.com/",
            appId: "1:844677752771:web:3b4e18a73a7a2636063f76"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.database();

        // REGISTER
        function register() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => alert("Registered Successfully"))
                .catch(err => alert(err.message));
        }

        // LOGIN
        function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => showDashboard())
                .catch(err => alert(err.message));
        }

        function showDashboard() {
            authBox.style.display = "none";
            dashboard.style.display = "block";
            listFiles();
        }

        function uploadFile() {
            const file = fileInput.files[0];
            if (!file) return alert("Select a file");

            const user = auth.currentUser;

            db.ref("files/").push({
                name: file.name,
                user: user.email,
                time: new Date().toString()
            });

            alert("File saved!");
        }

        function listFiles() {
            const user = auth.currentUser;

            db.ref("files/").on("value", snapshot => {
                fileList.innerHTML = "";

                snapshot.forEach(child => {
                    const data = child.val();

                    if (data.user === user.email) {
                        const li = document.createElement("li");
                        li.textContent = data.name;
                        fileList.appendChild(li);
                    }
                });
            });
        }

        function simulateRisk() {
            status.innerText = "⚠️ Unsafe environment detected!";
        }

        async function analyzeRisk() {
            const apiKey = "YOUR_GEMINI_API_KEY";

            const user = auth.currentUser;
            const prompt = `Analyze security risks for ${user?.email || "user"}`;

            try {
                const res = await fetch(
                    "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + apiKey,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    }
                );

                const data = await res.json();

                aiResult.innerText =
                    data?.candidates?.[0]?.content?.parts?.[0]?.text ||
                    "No response from AI.";

            } catch (err) {
                aiResult.innerText = "AI error.";
            }
        }

        function emergencyLock() {
            auth.signOut().then(() => location.reload());
        }

        auth.onAuthStateChanged(user => {
            if (user) showDashboard();
        });
    </script>

</body>

</html>
